name: Daily eCFR Update Check

on:
  schedule:
    # Runs at 12:00 PM UTC every day. You can adjust the cron schedule as needed.
    - cron: '0 12 * * *'
  workflow_dispatch: # This allows you to trigger the action manually from the GitHub UI

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push commits back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run eCFR Fetch Script
        run: python update_ecfr.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. Check if there are modifications in the ecfr_data folder BEFORE staging
          if git diff --quiet ecfr_data/; then
            echo "No changes in the eCFR XML data today. Skipping commit to keep history clean."
          else
            echo "XML changes detected! Generating changelog..."
            
            # 2. Extract the exact line-by-line changes and save them to a text file
            git diff ecfr_data/ > latest_changes.txt
            
            # 3. Stage the XML folder, the new changelog, and the last_run.txt file
            git add ecfr_data/ latest_changes.txt last_run.txt
            
            # 4. Commit and push everything to the repository
            git commit -m "Automated update: eCFR changes detected and logged"
            git push
          fi
