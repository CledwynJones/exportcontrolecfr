name: Daily eCFR Update Check

on:
  schedule:
    # Runs at 12:00 PM UTC every day. You can adjust the cron schedule as needed.
    - cron: '0 12 * * *'
  workflow_dispatch: # This allows you to trigger the action manually from the GitHub UI

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push commits back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run eCFR Fetch Script
        run: python update_ecfr.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage both the XML folder and the text file
          git add ecfr_data/ last_run.txt
          
          # Check if there are changes SPECIFICALLY in the ecfr_data folder
          if git diff --staged --quiet -- ecfr_data/; then
            echo "No changes in the eCFR XML data today. Skipping commit to keep history clean."
          else
            echo "XML changes detected! Committing updated XML and last_run.txt..."
            git commit -m "Automated update of eCFR XML data and timestamp"
            git push
          fi
